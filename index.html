<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>>/Eduardo Fiorini</title>
  <meta name="description" content="Portfólio de Eduardo Fiorini. Projetos em front-end, plataformas, dados e infraestrutura.">
  <link rel="icon" href="img/favicon-apolo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="img/favicon-apolo-120.png">
  <script src="pet-favicon.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="crm-mockup.css">
  <link rel="stylesheet" href="tax-mockup.css">
  <link rel="stylesheet" href="aplicari-mockup.css">
  <link rel="stylesheet" href="monitor-mockup.css">
  <link rel="stylesheet" href="prevhub-mockup.css">
  <link rel="stylesheet" href="pipeline-mockup.css">
  <link rel="stylesheet" href="prevdev-mockup.css">
  <link rel="stylesheet" href="netdist-mockup.css">
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>

  <div class="loader" id="boot" aria-hidden="false">
    <div class="boot-terminal">
      <div class="boot-bar">
        <i></i><i></i><i></i>
        <span>portfolio — zsh</span>
      </div>
      <div class="boot-body">
        <div class="boot-log" id="boot-log"></div>
        <div class="boot-input-line">
          <span class="boot-prompt">eduardo@portfolio ~ %</span>
          <span class="boot-cmd" id="boot-cmd"></span>
          <span class="boot-cursor" id="boot-cursor"></span>
        </div>
        <button type="button" class="boot-hint" id="boot-hint">Enter ↵ — bora buildar isso</button>
      </div>
    </div>
  </div>

  <header class="header" id="header"></header>

  <main>
    <section class="hero" id="hero"></section>
    <section class="work" id="work"></section>
    <section class="about" id="about"></section>
    <section class="contact" id="contact"></section>
  </main>

  <footer class="footer" id="footer"></footer>

  <div class="grid-signals" aria-hidden="true">
    <span class="grid-signal grid-signal--x" style="--line: 3"></span>
    <span class="grid-signal grid-signal--x" style="--line: 7; --delay: 4s"></span>
    <span class="grid-signal grid-signal--y" style="--line: 5; --delay: 2s"></span>
    <span class="grid-signal grid-signal--y" style="--line: 14; --delay: 6.5s"></span>
  </div>

  <script src="data.js"></script>
  <script src="crm-mockup.js"></script>
  <script src="tax-mockup.js"></script>
  <script src="aplicari-mockup.js"></script>
  <script src="monitor-mockup.js"></script>
  <script src="prevhub-mockup.js"></script>
  <script src="pipeline-mockup.js"></script>
  <script src="prevdev-mockup.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>gsap.registerPlugin(ScrollTrigger);</script>
  <script src="main.js"></script>
</body>
</html>
